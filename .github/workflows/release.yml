name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Verify and build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: rspack-unocss-plugin-dist
          path: packages/rspack-unocss-plugin/dist
          if-no-files-found: error
          retention-days: 30

  release:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create release PR or tag
        uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish:
    needs: [package, release]
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: publish-${{ needs.release.outputs.tag_name }}
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: rspack-unocss-plugin-dist
          path: packages/rspack-unocss-plugin/dist

      - name: Publish to npm
        run: pnpm --filter rspack-unocss-plugin publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Attach build artifact to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: |
            packages/rspack-unocss-plugin/dist/index.mjs
            packages/rspack-unocss-plugin/dist/loader.mjs
          fail_on_unmatched_files: false

      - name: Show release info
        run: |
          echo "Released ${{ needs.release.outputs.tag_name }}"
          echo "Version ${{ needs.release.outputs.version }}"
