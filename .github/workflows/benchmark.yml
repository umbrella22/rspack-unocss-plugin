name: Benchmark

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      file-count:
        description: Vue files generated in CI
        required: false
        default: "10000"
      runs:
        description: Build runs per plugin
        required: false
        default: "3"

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rspack-unocss-benchmark:
    name: rspack-unocss-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      BENCHMARK_VUE_COUNT: ${{ inputs.file-count || '20000' }}
      BENCHMARK_RUNS: ${{ inputs.runs || '3' }}
      BENCHMARK_OUTPUT_DIR: Benchmark/results
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmark
        run: pnpm benchmark:ci

      - name: Write summary
        run: cat Benchmark/results/benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: rspack-unocss-benchmark
          path: Benchmark/results
          if-no-files-found: error
          retention-days: 14
