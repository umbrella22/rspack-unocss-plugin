name: Benchmark

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      file-count:
        description: Vue files generated in CI
        required: false
        default: "20000"
      runs:
        description: Build runs per plugin
        required: false
        default: "3"

concurrency:
  group: benchmark-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rspack-unocss-benchmark:
    name: rspack-unocss-benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      BENCHMARK_VUE_COUNT: ${{ inputs.file-count || '20000' }}
      BENCHMARK_RUNS: ${{ inputs.runs || '3' }}
      BENCHMARK_OUTPUT_DIR: Benchmark/results
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmark
        run: pnpm benchmark:ci

      - name: Write summary
        run: cat Benchmark/results/benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        with:
          name: rspack-unocss-benchmark
          path: Benchmark/results
          if-no-files-found: error
          retention-days: 14

  comment-on-pr:
    name: Comment benchmark results on PR
    needs: rspack-unocss-benchmark
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: rspack-unocss-benchmark
          path: benchmark-results

      - name: Build comment body
        shell: bash
        run: |
          {
            cat benchmark-results/benchmark-summary.md
            echo ""
            echo ""
            echo "<sub>Generated by the [Benchmark workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Re-runs on every push to this PR.</sub>"
          } > comment.md

      - name: Find existing benchmark comment
        uses: peter-evans/find-comment@v4
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: Rspack UnoCSS Plugin Benchmark

      - name: Create or update benchmark comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body-path: comment.md
          edit-mode: replace
